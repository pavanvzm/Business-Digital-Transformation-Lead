apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-02-production
  namespace: manufacturing-mas
  labels:
    app: manufacturing-mas
    agent: agent-02
    tier: production
spec:
  replicas: 2
  minReadySeconds: 15
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: manufacturing-mas
      agent: agent-02
  template:
    metadata:
      labels:
        app: manufacturing-mas
        agent: agent-02
        tier: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: agent-02-serviceaccount
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: agent-02
          image: manufacturing-mas/agent-02-production:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http-health
              protocol: TCP
          envFrom:
            - configMapRef:
                name: agent-02-config
            - secretRef:
                name: agent-02-secrets
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: agent-02-config
                  key: KAFKA_BOOTSTRAP_SERVERS
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: agent-queue
              mountPath: /var/agent-02/queue
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: "100Mi"
        - name: agent-queue
          emptyDir:
            sizeLimit: "500Mi"
