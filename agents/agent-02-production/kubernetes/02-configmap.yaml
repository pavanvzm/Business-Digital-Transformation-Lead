apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-02-config
  namespace: manufacturing-mas
  labels:
    agent: agent-02
data:
  AGENT_ID: "agent-02"
  AGENT_VERSION: "1.0.0"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster:9092"
  KAFKA_CONSUMER_GROUP_ID: "agent-02-production"
  KAFKA_TOPIC_PRODUCTION_EVENTS: "events.production"
  KAFKA_TOPIC_INVENTORY_EVENTS: "events.inventory"
  KAFKA_TOPIC_FORECAST_EVENTS: "events.forecast"
  KAFKA_TOPIC_ORCHESTRATOR_EVENTS: "events.orchestrator"
  DB_POOL_MIN_SIZE: "2"
  DB_POOL_MAX_SIZE: "10"
  OEE_AVAILABILITY_TARGET_PCT: "90.0"
  OEE_PERFORMANCE_TARGET_PCT: "95.0"
  OEE_QUALITY_TARGET_PCT: "99.0"
  OEE_OEE_CRITICAL_THRESHOLD_PCT: "70.0"
  OEE_QUALITY_DEFECT_CRITICAL_PCT: "5.0"
  OEE_SCHEDULE_VARIANCE_HOURS: "8.0"
  OEE_PM_CONFIDENCE_THRESHOLD: "0.85"
  OEE_PM_CRITICAL_CONFIDENCE: "0.95"
  HITL_TIMEOUT_SECONDS: "3600"
  HITL_POLL_INTERVAL_SECONDS: "10"
