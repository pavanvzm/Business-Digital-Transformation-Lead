apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-02-hpa
  namespace: manufacturing-mas
  labels:
    app: manufacturing-mas
    agent: agent-02
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-02-production
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
