# =============================================================================
# Manufacturing MAS — Agent-01 ServiceAccount
#
# Provides identity for pod-level security context and RBAC access.
# In production, bind this to a Role or ClusterRole as needed.
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-01-sa
  namespace: manufacturing-mas
  labels:
    app.kubernetes.io/name: agent-01
    app.kubernetes.io/component: procurement
    app.kubernetes.io/part-of: manufacturing-mas
  annotations:
    description: "ServiceAccount for Agent-01 Procurement pod"
---
# Minimal RBAC: allow access to agent's own pod for leader-election/health
# Expand as needed for agent-specific requirements
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-01-role
  namespace: manufacturing-mas
  labels:
    app.kubernetes.io/name: agent-01
    app.kubernetes.io/component: procurement
    app.kubernetes.io/part-of: manufacturing-mas
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-01-rolebinding
  namespace: manufacturing-mas
  labels:
    app.kubernetes.io/name: agent-01
    app.kubernetes.io/component: procurement
    app.kubernetes.io/part-of: manufacturing-mas
subjects:
  - kind: ServiceAccount
    name: agent-01-sa
    namespace: manufacturing-mas
roleRef:
  kind: Role
  name: agent-01-role
  apiGroup: rbac.authorization.k8s.io
