# =============================================================================
# Manufacturing MAS — Agent-01 Secrets
#
# In production, use External Secrets Operator or SealedSecrets to manage
# these values. This template documents the required secret keys.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: agent-01-secrets
  namespace: manufacturing-mas
  labels:
    app.kubernetes.io/name: agent-01
    app.kubernetes.io/component: procurement
    app.kubernetes.io/part-of: manufacturing-mas
type: Opaque
stringData:
  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster-kafka-bootstrap.kafka.svc:9092"
  KAFKA_CONSUMER_GROUP_ID: "agent-01-procurement"

  # PostgreSQL
  DB_POSTGRES_DSN: "postgresql+asyncpg://mas_user:${DB_PASSWORD}@postgres-primary.postgres.svc:5432/mas_procurement"

  # Redis
  DB_REDIS_URL: "redis://redis-cluster.redis.svc:6379/0"
---
